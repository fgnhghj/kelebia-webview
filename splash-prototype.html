<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelebia Splash Prototype</title>
    <!-- Use Google Fonts to match the main app -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --bg-deep: #1a1714;
            --text-primary: #e8e0d4;
            --accent: #d97757;
            --safe-bottom: 0px;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-deep);
            color: var(--text-primary);
            font-family: "Inter", system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ─── Layout Structure ─── */
        .splash-screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-deep);
            z-index: 9999;
        }

        .splash-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            width: min(100%, 360px);
            padding: 32px 28px 80px;
        }

        /* ─── Emblem / SVG Logo ─── */
        .splash-emblem {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(16px) scale(0.8);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .splash-emblem.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .splash-icon-card {
            position: relative;
            z-index: 2;
        }

        .splash-icon {
            position: relative;
            width: 132px;
            height: 132px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: translateY(12px) scale(0.78);
            transition: all 0.95s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .splash-icon.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .splash-k-svg {
            position: relative;
            z-index: 2;
            padding: 0;
            /* Move SVG slightly to center visual weight */
            transform: translateX(-4px);
        }

        /* ─── K Logo SVG Paths ─── */
        .splash-k-svg .k-line {
            stroke-linecap: round;
            fill: none;
            stroke: var(--accent);
            stroke-width: 6;
        }

        .k-line-1 {
            stroke-dasharray: 52 1000;
            stroke-dashoffset: 52;
        }

        .k-line-2 {
            stroke-dasharray: 42 1000;
            stroke-dashoffset: 42;
        }

        .k-line-3 {
            stroke-dasharray: 40 1000;
            stroke-dashoffset: 40;
        }


        /* Sequential Drawing */
        /* Vertical line - NO bounce, standard ease-out draw */
        .splash-k-svg.draw .k-line-1 {
            animation: k-draw-linear 0.25s ease-out 0.1s forwards;
        }

        /* Top-diagonal line - standard draw + bounce AFTER */
        .splash-k-svg.draw .k-line-2 {
            animation:
                k-draw-linear 0.25s ease-out 0.4s forwards,
                k-line-bounce-top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.65s forwards;
            /* Transform origin MUST be at the elbow (intersection) to stretch/bounce outward */
            transform-origin: 26px 44px;
        }

        /* Bottom-diagonal line - standard draw + bounce AFTER */
        .splash-k-svg.draw .k-line-3 {
            animation:
                k-draw-linear 0.25s ease-out 0.7s forwards,
                k-line-bounce-bot 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) 0.95s forwards;
            /* Transform origin MUST be at the elbow (intersection) */
            transform-origin: 34px 38px;
        }

        @keyframes k-draw-linear {
            to {
                stroke-dashoffset: 0;
            }
        }

        /* Scale X/Y creates a stretching rubber-band effect originating from the elbow */
        @keyframes k-line-bounce-top {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(1.12);
            }

            80% {
                transform: scale(0.96);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes k-line-bounce-bot {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(1.15);
            }

            80% {
                transform: scale(0.95);
            }

            100% {
                transform: scale(1);
            }
        }


        /* ─── Text block (badge + title + tagline) ─── */
        .splash-text-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transform: translateY(14px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .splash-text-block.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .splash-badge {
            display: inline-block;
            padding: 4px 14px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            background: rgba(217, 119, 87, 0.1);
            border: 1px solid rgba(217, 119, 87, 0.15);
            border-radius: 999px;
        }

        .splash-title {
            font-family: "EB Garamond", Georgia, serif;
            font-size: 34px;
            font-weight: 600;
            line-height: 1.05;
            color: var(--text-primary);
            letter-spacing: 0.02em;
            text-align: center;
            opacity: 0;
            transform: translateY(16px);
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.28);
            position: relative;
            overflow: hidden;
            margin: 0;
        }

        .splash-title.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .splash-title-main {
            position: relative;
            z-index: 1;
        }

        .splash-title-shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.12) 50%, transparent 100%);
            animation: splash-shine-sweep 3.5s ease-in-out 1.5s infinite;
            pointer-events: none;
        }

        @keyframes splash-shine-sweep {
            0% {
                left: -100%;
            }

            40% {
                left: 150%;
            }

            100% {
                left: 150%;
            }
        }

        .splash-tagline {
            display: inline-block;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 700;
            color: var(--bg-deep);
            background: linear-gradient(135deg, #e8e0d4, #d4b896);
            letter-spacing: 0.25em;
            text-transform: uppercase;
            text-align: center;
            border-radius: 4px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.65s cubic-bezier(0.16, 1, 0.3, 1) 0.08s;
            margin: 0;
            box-shadow: 0 2px 8px rgba(232, 224, 212, 0.2);
        }

        .splash-tagline.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ─── Loader (progress bar + loading dots) ─── */
        .splash-loader {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            margin-top: 8px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }

        .splash-loader.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .splash-progress {
            width: 120px;
            height: 3px;
            background: rgba(217, 119, 87, 0.1);
            border-radius: 999px;
            overflow: hidden;
        }

        .splash-progress-bar {
            width: 0%;
            height: 100%;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.9);
            transition: width 0.3s ease;
        }

        .splash-progress-bar.animate {
            animation: splash-progress-fill 2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes splash-progress-fill {
            0% {
                width: 0%;
            }

            20% {
                width: 25%;
            }

            50% {
                width: 55%;
            }

            80% {
                width: 85%;
            }

            100% {
                width: 100%;
            }
        }

        .splash-loading-dots {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .splash-loading-dots .splash-dot {
            width: 5px;
            height: 5px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.35);
            animation: splash-dot-bounce 1.4s ease-in-out infinite;
        }

        .splash-loading-dots .splash-dot:nth-child(1) {
            animation-delay: 0s;
        }

        .splash-loading-dots .splash-dot:nth-child(2) {
            animation-delay: 0.16s;
        }

        .splash-loading-dots .splash-dot:nth-child(3) {
            animation-delay: 0.32s;
        }

        @keyframes splash-dot-bounce {

            0%,
            80%,
            100% {
                transform: scale(0.7);
                opacity: 0.35;
            }

            40% {
                transform: scale(1.3);
                opacity: 1;
                background: #ffffff;
            }
        }

        .splash-branding {
            position: absolute;
            bottom: calc(34px + var(--safe-bottom));
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.26em;
            text-transform: uppercase;
            color: rgba(232, 224, 212, 0.36);
            opacity: 0;
            transition: opacity 0.7s ease 0.28s;
            z-index: 2;
            white-space: nowrap;
        }

        .splash-branding.visible {
            opacity: 1;
        }

        .splash-branding-line {
            display: inline-block;
            width: 20px;
            height: 1px;
            background: rgba(232, 224, 212, 0.18);
        }

        /* Replay button */
        #replay {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 10px 20px;
            background: #d97757;
            border: none;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            z-index: 99999;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>

    <div class="splash-screen">
        <div class="splash-content">
            <div id="el-emblem" class="splash-emblem">
                <div class="splash-icon-card">
                    <div id="el-icon" class="splash-icon">
                        <!-- Replaced classes with IDs so we can trigger the draw easily in Vanilla JS -->
                        <svg id="el-svg" width="92" height="92" viewBox="0 0 88 88" fill="none"
                            class="splash-k-svg draw">
                            <!-- Line 1: Static Draw, NO bounce -->
                            <path class="k-line k-line-1" d="M26 18 L26 70" />
                            <!-- Line 2: Top Diagonal -->
                            <path class="k-line k-line-2" d="M26 44 L58 18" />
                            <!-- Line 3: Bottom Diagonal -->
                            <path class="k-line k-line-3" d="M34 38 L58 70" />

                        </svg>
                    </div>
                </div>
            </div>

            <div id="el-textblock" class="splash-text-block">
                <div class="splash-badge">Kelebia Classroom</div>

                <h1 id="el-title" class="splash-title">
                    <span class="splash-title-main">ISET Classroom</span>
                    <span class="splash-title-shine"></span>
                </h1>

                <div id="el-tagline" class="splash-tagline">
                    BETA
                </div>
            </div>

            <div id="el-loader" class="splash-loader">
                <div class="splash-progress">
                    <div id="el-progressbar" class="splash-progress-bar"></div>
                </div>

                <div class="splash-loading-dots" aria-hidden="true">
                    <span class="splash-dot"></span>
                    <span class="splash-dot"></span>
                    <span class="splash-dot"></span>
                </div>
            </div>
        </div>

        <div id="el-branding" class="splash-branding">
            <span class="splash-branding-line"></span>
            <span>BY AYMEN HM</span>
            <span class="splash-branding-line"></span>
        </div>
    </div>

    <button id="replay">Replay Full Splash Sequence</button>

    <script>
        const elEmblem = document.getElementById('el-emblem');
        const elIcon = document.getElementById('el-icon');
        const elSvg = document.getElementById('el-svg');
        const elTextblock = document.getElementById('el-textblock');
        const elTitle = document.getElementById('el-title');
        const elTagline = document.getElementById('el-tagline');
        const elLoader = document.getElementById('el-loader');
        const elProgressbar = document.getElementById('el-progressbar');
        const elBranding = document.getElementById('el-branding');
        const replayBtn = document.getElementById('replay');

        const timers = [];

        function playSequence() {
            // Clear current states
            timers.forEach(clearTimeout);
            timers.length = 0;

            const elements = [elEmblem, elIcon, elTextblock, elTitle, elTagline, elLoader, elBranding];
            elements.forEach(el => el.classList.remove('visible'));
            elProgressbar.classList.remove('animate');
            elSvg.classList.remove('draw');

            // Force redraw to remove animations
            void elSvg.offsetWidth;

            // Trigger steps simulating React state (80, 420, 920, 1400)
            timers.push(setTimeout(() => {
                // Stage 1
                elEmblem.classList.add('visible');
                elIcon.classList.add('visible');
                elSvg.classList.add('draw');
            }, 80));

            timers.push(setTimeout(() => {
                // Stage 2
                elTextblock.classList.add('visible');
                elTitle.classList.add('visible');
            }, 620));

            timers.push(setTimeout(() => {
                // Stage 3
                elTagline.classList.add('visible');
                elBranding.classList.add('visible');
            }, 1020));

            timers.push(setTimeout(() => {
                // Stage 4
                elLoader.classList.add('visible');
                elProgressbar.classList.add('animate');
            }, 1500));
        }

        // Run on load
        playSequence();

        // Run on button click
        replayBtn.addEventListener('click', playSequence);
    </script>
</body>

</html>
