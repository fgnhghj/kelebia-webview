name: Build Capacitor APK (android-app-studio)

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "android-app-studio/**"
      - ".github/workflows/capacitor-build.yml"

defaults:
  run:
    working-directory: android-app-studio

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor CLI
        run: npm install @capacitor/cli

      - name: Remove unused push-notifications if present
        run: npm uninstall @capacitor/push-notifications 2>/dev/null || true

      - name: Build web app
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || true

      - name: Patch Android theme to non-fullscreen BEFORE sync
        run: |
          STYLES_FILE="android/app/src/main/res/values/styles.xml"
          cat > "$STYLES_FILE" <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:statusBarColor">#1a1714</item>
                  <item name="android:navigationBarColor">#1a1714</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:windowFullscreen">false</item>
                  <item name="android:windowDrawsSystemBarBackgrounds">true</item>
                  <item name="android:windowBackground">#1a1714</item>
                  <item name="android:colorPrimaryDark">#1a1714</item>
              </style>
              <style name="AppTheme.NoActionBar" parent="AppTheme">
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowFullscreen">false</item>
              </style>
              <style name="AppTheme.NoActionBarLaunch" parent="AppTheme.NoActionBar">
                  <item name="android:background">#1a1714</item>
                  <item name="android:windowFullscreen">false</item>
              </style>
          </resources>
          XML

      - name: Patch MainActivity to force status bar visible
        run: |
          MAIN_ACTIVITY="android/app/src/main/java/app/aymen/isetclassroom/MainActivity.java"
          mkdir -p "$(dirname $MAIN_ACTIVITY)"
          cat > "$MAIN_ACTIVITY" <<'JAVA'
          package app.aymen.isetclassroom;

          import com.getcapacitor.BridgeActivity;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.View;
          import android.view.ViewGroup;
          import android.view.Window;
          import android.view.WindowManager;
          import android.graphics.Color;
          import androidx.core.view.WindowCompat;
          import androidx.core.view.WindowInsetsCompat;
          import androidx.core.view.WindowInsetsControllerCompat;
          import androidx.core.view.ViewCompat;
          import androidx.core.graphics.Insets;

          public class MainActivity extends BridgeActivity {
              private static final int STATUS_BAR_COLOR = Color.parseColor("#1a1714");

              private void forceStatusBarColor() {
                  Window window = getWindow();
                  window.clearFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  window.clearFlags(WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS);
                  window.clearFlags(WindowManager.LayoutParams.FLAG_TRANSLUCENT_STATUS);
                  window.clearFlags(WindowManager.LayoutParams.FLAG_TRANSLUCENT_NAVIGATION);
                  WindowCompat.setDecorFitsSystemWindows(window, true);
                  window.addFlags(WindowManager.LayoutParams.FLAG_DRAWS_SYSTEM_BAR_BACKGROUNDS);
                  window.setStatusBarColor(STATUS_BAR_COLOR);
                  window.setNavigationBarColor(STATUS_BAR_COLOR);

                  View decorView = window.getDecorView();
                  decorView.setSystemUiVisibility(View.SYSTEM_UI_FLAG_VISIBLE);

                  WindowInsetsControllerCompat controller = WindowCompat.getInsetsController(window, decorView);
                  if (controller != null) {
                      controller.show(WindowInsetsCompat.Type.statusBars());
                      controller.show(WindowInsetsCompat.Type.navigationBars());
                      controller.setAppearanceLightStatusBars(false);
                  }

                  ViewGroup contentView = findViewById(android.R.id.content);
                  if (contentView != null) {
                      contentView.setFitsSystemWindows(true);
                      contentView.setBackgroundColor(STATUS_BAR_COLOR);
                      if (contentView.getChildCount() > 0) {
                          contentView.getChildAt(0).setFitsSystemWindows(true);
                      }
                  }

                  ViewCompat.setOnApplyWindowInsetsListener(decorView, (v, insets) -> {
                      Insets systemBars = insets.getInsets(WindowInsetsCompat.Type.systemBars());
                      ViewGroup content = findViewById(android.R.id.content);
                      if (content != null) {
                          content.setPadding(systemBars.left, systemBars.top, systemBars.right, systemBars.bottom);
                      }
                      return WindowInsetsCompat.CONSUMED;
                  });
              }

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  forceStatusBarColor();
                  new Handler(Looper.getMainLooper()).postDelayed(this::forceStatusBarColor, 300);
                  new Handler(Looper.getMainLooper()).postDelayed(this::forceStatusBarColor, 1000);
              }

              @Override
              public void onResume() {
                  super.onResume();
                  forceStatusBarColor();
                  new Handler(Looper.getMainLooper()).postDelayed(this::forceStatusBarColor, 300);
              }
          }
          JAVA

      - name: Remove immersive/fullscreen from AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:windowFullscreen="true"/android:windowFullscreen="false"/g' "$MANIFEST"
          sed -i 's/android:immersive="true"/android:immersive="false"/g' "$MANIFEST"
          sed -i 's/android:theme="@style\/AppTheme.NoActionBarLaunch"/android:theme="@style\/AppTheme"/g' "$MANIFEST"
          # Add storage permissions (legacy for <=32, granular for 13+)
          sed -i '/<uses-permission android:name="android.permission.INTERNET"/a\
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />\
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\
              <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\
              <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />\
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "$MANIFEST"
          # Add requestLegacyExternalStorage for API 29
          sed -i 's/<application/<application android:requestLegacyExternalStorage="true"/' "$MANIFEST"

      - name: Fix Kotlin version conflicts
        run: |
          cat >> android/app/build.gradle <<'GRADLE'

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.24'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.24'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.24'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-common:1.9.24'
              }
          }
          GRADLE

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Re-apply patches after sync
        run: |
          STYLES_FILE="android/app/src/main/res/values/styles.xml"
          cat > "$STYLES_FILE" <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:statusBarColor">#1a1714</item>
                  <item name="android:navigationBarColor">#1a1714</item>
                  <item name="android:windowLightStatusBar">false</item>
                  <item name="android:windowFullscreen">false</item>
                  <item name="android:windowDrawsSystemBarBackgrounds">true</item>
                  <item name="android:windowBackground">#1a1714</item>
                  <item name="android:colorPrimaryDark">#1a1714</item>
              </style>
              <style name="AppTheme.NoActionBar" parent="AppTheme">
                  <item name="android:windowActionBar">false</item>
                  <item name="android:windowNoTitle">true</item>
                  <item name="android:windowFullscreen">false</item>
              </style>
              <style name="AppTheme.NoActionBarLaunch" parent="AppTheme.NoActionBar">
                  <item name="android:background">#1a1714</item>
                  <item name="android:windowFullscreen">false</item>
              </style>
          </resources>
          XML

          MAIN_ACTIVITY="android/app/src/main/java/app/aymen/isetclassroom/MainActivity.java"
          mkdir -p "$(dirname $MAIN_ACTIVITY)"
          cat > "$MAIN_ACTIVITY" <<'JAVA'
          package app.aymen.isetclassroom;
          import com.getcapacitor.BridgeActivity;
          import android.os.Bundle;
          import android.os.Handler;
          import android.os.Looper;
          import android.view.View;
          import android.view.ViewGroup;
          import android.view.Window;
          import android.view.WindowManager;
          import android.graphics.Color;
          import androidx.core.view.WindowCompat;
          import androidx.core.view.WindowInsetsCompat;
          import androidx.core.view.WindowInsetsControllerCompat;
          import androidx.core.view.ViewCompat;
          import androidx.core.graphics.Insets;
          public class MainActivity extends BridgeActivity {
              private static final int STATUS_BAR_COLOR = Color.parseColor("#1a1714");
              private void forceStatusBarColor() {
                  Window window = getWindow();
                  window.clearFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN);
                  window.clearFlags(WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS);
                  window.clearFlags(WindowManager.LayoutParams.FLAG_TRANSLUCENT_STATUS);
                  window.clearFlags(WindowManager.LayoutParams.FLAG_TRANSLUCENT_NAVIGATION);
                  WindowCompat.setDecorFitsSystemWindows(window, true);
                  window.addFlags(WindowManager.LayoutParams.FLAG_DRAWS_SYSTEM_BAR_BACKGROUNDS);
                  window.setStatusBarColor(STATUS_BAR_COLOR);
                  window.setNavigationBarColor(STATUS_BAR_COLOR);
                  View decorView = window.getDecorView();
                  decorView.setSystemUiVisibility(View.SYSTEM_UI_FLAG_VISIBLE);
                  WindowInsetsControllerCompat controller = WindowCompat.getInsetsController(window, decorView);
                  if (controller != null) {
                      controller.show(WindowInsetsCompat.Type.statusBars());
                      controller.show(WindowInsetsCompat.Type.navigationBars());
                      controller.setAppearanceLightStatusBars(false);
                  }
                  ViewGroup contentView = findViewById(android.R.id.content);
                  if (contentView != null) {
                      contentView.setFitsSystemWindows(true);
                      contentView.setBackgroundColor(STATUS_BAR_COLOR);
                      if (contentView.getChildCount() > 0) {
                          contentView.getChildAt(0).setFitsSystemWindows(true);
                      }
                  }
                  ViewCompat.setOnApplyWindowInsetsListener(decorView, (v, insets) -> {
                      Insets systemBars = insets.getInsets(WindowInsetsCompat.Type.systemBars());
                      ViewGroup content = findViewById(android.R.id.content);
                      if (content != null) {
                          content.setPadding(systemBars.left, systemBars.top, systemBars.right, systemBars.bottom);
                      }
                      return WindowInsetsCompat.CONSUMED;
                  });
              }
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  forceStatusBarColor();
                  new Handler(Looper.getMainLooper()).postDelayed(this::forceStatusBarColor, 300);
                  new Handler(Looper.getMainLooper()).postDelayed(this::forceStatusBarColor, 1000);
              }
              @Override
              public void onResume() {
                  super.onResume();
                  forceStatusBarColor();
                  new Handler(Looper.getMainLooper()).postDelayed(this::forceStatusBarColor, 300);
              }
          }
          JAVA

          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's/android:windowFullscreen="true"/android:windowFullscreen="false"/g' "$MANIFEST"
          sed -i 's/android:immersive="true"/android:immersive="false"/g' "$MANIFEST"
          sed -i 's/android:theme="@style\/AppTheme.NoActionBarLaunch"/android:theme="@style\/AppTheme"/g' "$MANIFEST"
          # Re-add Android 13+ permissions if missing after sync
          if ! grep -q 'READ_MEDIA_IMAGES' "$MANIFEST"; then
            sed -i '/<uses-permission android:name="android.permission.INTERNET"/a\
                <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\
                <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />\
                <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />\
                <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />' "$MANIFEST"
          fi

      - name: Copy app icon to Android resources
        run: |
          for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            if [ -f public/app-icon.png ]; then
              cp public/app-icon.png android/app/src/main/res/$dir/ic_launcher.png
              cp public/app-icon.png android/app/src/main/res/$dir/ic_launcher_round.png
              cp public/app-icon.png android/app/src/main/res/$dir/ic_launcher_foreground.png
            fi
          done

      - name: Create notification icon (monochrome vector drawable)
        run: |
          # Create drawable dir
          mkdir -p android/app/src/main/res/drawable

          # Create a proper monochrome notification icon (graduation cap / book icon)
          cat > android/app/src/main/res/drawable/ic_notification.xml <<'XMLVECTOR'
          <?xml version="1.0" encoding="utf-8"?>
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="24dp"
              android:height="24dp"
              android:viewportWidth="24"
              android:viewportHeight="24"
              android:tint="#FFFFFF">
              <path
                  android:fillColor="@android:color/white"
                  android:pathData="M12,3L1,9l4,2.18v6L12,21l7,-3.82v-6l2,-1.09V17h2V9L12,3zM18.82,9L12,12.72 5.18,9 12,5.28 18.82,9zM17,15.99l-5,2.73 -5,-2.73v-3.72L12,15l5,-2.73v3.72z"/>
          </vector>
          XMLVECTOR

          # Also copy app icon as a drawable for largeIcon fallback
          if [ -f public/app-icon.png ]; then
            cp public/app-icon.png android/app/src/main/res/drawable/ic_launcher.png
          fi

      - name: Re-apply Kotlin fix after sync
        run: |
          # Sync may overwrite build.gradle — re-add the resolution strategy
          if ! grep -q 'resolutionStrategy' android/app/build.gradle; then
            cat >> android/app/build.gradle <<'GRADLE'

          configurations.all {
              resolutionStrategy {
                  force 'org.jetbrains.kotlin:kotlin-stdlib:1.9.24'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.24'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.24'
                  force 'org.jetbrains.kotlin:kotlin-stdlib-common:1.9.24'
              }
          }
          GRADLE
          fi

      - name: Build APK
        working-directory: android-app-studio/android
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: capacitor-app-debug
          path: android-app-studio/android/app/build/outputs/apk/debug/app-debug.apk
