name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-33" "build-tools;33.0.0"

      - name: Install Gradle 7.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-7.5-bin.zip -O gradle-7.5.zip
          unzip -q gradle-7.5.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-7.5/bin" >> $GITHUB_PATH

      - name: Build debug APK
        working-directory: android-webview
        run: |
          unset ANDROID_SDK_ROOT
          export ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android-webview/app/build/outputs/apk/debug/app-debug.apk
