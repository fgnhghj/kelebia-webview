name: Build Android APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.4

      - name: Install Android SDK components
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install ImageMagick
        run: sudo apt-get install -y -qq imagemagick

      - name: Generate launcher icons
        working-directory: android-webview
        run: |
          # Generate PNG launcher icons for pre-API 26 devices
          for entry in "mdpi:48" "hdpi:72" "xhdpi:96" "xxhdpi:144" "xxxhdpi:192"; do
            dir=$(echo $entry | cut -d: -f1)
            size=$(echo $entry | cut -d: -f2)
            mkdir -p app/src/main/res/mipmap-$dir
            # Blue (#2563EB) background with white "K"
            convert -size ${size}x${size} xc:'#2563EB' \
              -fill white -gravity center \
              -font DejaVu-Sans-Bold -pointsize $((size * 55 / 100)) \
              -annotate +0+0 'K' \
              app/src/main/res/mipmap-$dir/ic_launcher.png
            cp app/src/main/res/mipmap-$dir/ic_launcher.png \
              app/src/main/res/mipmap-$dir/ic_launcher_round.png
          done

      - name: Build debug APK
        working-directory: android-webview
        run: |
          export ANDROID_HOME="${ANDROID_HOME:-/usr/local/lib/android/sdk}"
          echo "sdk.dir=$ANDROID_HOME" > local.properties
          gradle assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kelebia-classroom-debug
          path: android-webview/app/build/outputs/apk/debug/app-debug.apk
